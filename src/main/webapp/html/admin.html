<html>
    <head>
        <title>admin page</title>

        <link rel="stylesheet" href="/E-199/css/Initial_Page.css">
    </head>
    <body>
        <nav class="Navbar">
            <button id="LogoutButton" class="extraButtons">Logout</button>

            <!-- Database message -->
            <span id="DatabaseMessage"></span>
