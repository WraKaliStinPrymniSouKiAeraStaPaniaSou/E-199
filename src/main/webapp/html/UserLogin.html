<!DOCTYPE html>
<html>
    <head>
        <title>User Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/E-199/css/Initial_Page.css">
    </head>
    <body>
        <div class="menu">
            <h2>Login</h2>
            <form id="form" class="Form">
                <!-- Username -->
                <label for="username">Username</label>
                <input type="text" id="username" required>
            
                <!-- Password -->
                <label for="password">Password</label>
                <input type="password" id="password" required>
            
                <button type="submit" id="submit" class="extraButtons">Login</button>
                <span id="LoginMessage"></span>
            </form>
        </div>
        
        <!-- JavaScript files -->
        <script src="/E-199/js/UserLogin.js"></script>
        <script src="/E-199/js/UserSessionTimeout.js"></script>
    </body>
</html>
