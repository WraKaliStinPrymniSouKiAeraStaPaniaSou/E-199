    <div class="menu">
        <h1>Registration</h1>
        <form id="form" class="Form" action="#">
            <!-- Username -->
            <label for="username">Username*</label>
            <input type="text" id="username" name="username" pattern="^[A-Za-z][A-Za-z0-9]{8,}$" minlength="8" title="The username must contain at least 8 characters (Latin characters) that must never start with a number or symbol." required>
            <span id="check_Username_Message"></span>
            
            <!-- email -->
            <label for="email">email*</label>
            <input type="email" id="email" name="email" title="Please provide a valid email address." placeholder="user@gmail.com" required>
            <span id="check_email_message"></span>
            
            <!-- password -->
            <label for="password">password*</label>
            <input type="password" id="password" name="password" pattern="(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,18}" title="The password must be 8 characters minimum and 18 characters maximum. It also must contain at least one uppercase Latin letter, one number and one symbol." oninput="password_strength()" required>
            <button type="button" class="extraButtons" onclick="Reveal_Hide_password('password', this)" value="show password">show password</button>
            <span id="code-strength"></span>
            <span id="submit_cannot_happen"></span>

            <!-- password confirmation -->
            <label for="passwordc">password confirmation*</label>
            <input type="password" id="passwordc" name="passwordc" pattern="(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,18}" title="Confirm your password." required>
            <button type="button" class="extraButtons" onclick="Reveal_Hide_password('passwordc', this)" value="show password">show password</button>

            <!-- Error message for the codes -->
            <label for="code-error"></label>
            <span id="code-error"></span>

            <!-- First name -->
            <label for="name">Firstname*</label>
            <input type="text" id="firstname" name="firstname" pattern="[A-Za-zΑ-Ωα-ω]{3,30}" title="The name must contain from 3 to 30 characters and no numbers." placeholder="FirstName" required>

            <!-- Last name -->
            <label for="name">Lastname*</label>
            <input type="text" id="lastname" name="lastname" pattern="[A-Za-zΑ-Ωα-ω]{3,30}" title="The name must contain from 3 to 30 characters and no numbers." placeholder="LastName" required>

            <!-- Birth date -->
            <label for="date">Birth Date*</label>
            <input type="date" id="birthdate" name="birthdate" value="1980-01-01" min="1920-01-01" max="2011-12-31" title="The birth date must be from 01-01-1920 to 31-12-2011" required>

            <!-- Gender -->
            <label for="gender">Gender*</label>
            <select name="gender" id="gender" required>
                <option value="" style="display:none;">choose your gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <!-- AFM -->
            <label for="afm">ΑΦΜ*</label>
            <input type="text" id="afm" name="afm" pattern="[0-9]{10}" title="Your ΑΦΜ must contain 10 digits." placeholder="0123456789" required>

            <!-- Municipality of Residence -->
            <label for="municipality">Municipality*</label>
            <input type="text" name="municipality" id="municipality" pattern="[A-Za-zΑ-Ωα-ω]{3,30}" title="Please write your municipality of residence." placeholder="Municipality" required>

            <!-- Home Address -->
            <label for="address">Address*</label>
            <input type="text" name="address" id="address" pattern=".{10,150}" title="Please write your home address." required>
     
            <!-- Occupation -->
            <label for="Occupation">Occupation*</label>
            <input type="text" name="job" id="job" pattern="^.{3,30}" title="Please write your occupation." placeholder="Γεωπόνος" required>

            <!-- Phone number -->
            <label for="Phone-Number">Phone Number*</label>
            <input type="tel" name="telephone" id="telephone" pattern="[0-9]{10}" title="Please write your phone number (10 digits)." placeholder="0123456789" required>

            <!-- Check message for unique phone -->
            <span id="check_telephone_message"></span>
            
            <!-- Checkbox -->
            <label id="terms">
                <span id="terms_text">I have read and accept the Terms of Use and the Privacy Policy.</span>
                <input type="checkbox" name="accept-terms" id="accept-terms" required>
            </label>
